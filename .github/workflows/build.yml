name: Build Mod

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Fix and Build
        run: |
          # Pobieranie brakujących plików Gradle, jeśli ich nie ma
          mkdir -p gradle/wrapper
          curl -L https://github.com/gradle/gradle/raw/v8.10.2/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          curl -L https://raw.githubusercontent.com/gradle/gradle/v8.10.2/gradlew -o gradlew
          chmod +x gradlew
          # Budowanie moda
          ./gradlew build --no-daemon

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CharlieKopacz-Mod
          path: build/libs/*.jar
